# HARDEN-68 (CI-1) — auto-update open PRs so agents never hand-merge master.
# Every run, merge `master` into any open PR that is behind and not conflicting (GitHub
# "update-branch"). Paired with auto-merge, PRs then land the moment their gate is green.
# Only touches clean-behind PRs; conflicting PRs are left for the author to resolve.
#
# NOTE: if scheduled Actions are disabled on the canonical repo, run the same script from a
# prod systemd timer instead (like scripts/switchboard_pr_gate.py):
#   */12 * * * *  GH_TOKEN=... python scripts/auto_update_prs.py --repo 6th-Element-Labs/projectplanner
name: auto-update-prs

on:
  schedule:
    - cron: "7,19,31,43,55 * * * *"   # ~every 12 min, off the :00/:30 marks
  workflow_dispatch:
    inputs:
      dry_run:
        description: "List behind PRs without updating"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-update-prs
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update behind PR branches
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/auto_update_prs.py \
            --repo "${{ github.repository }}" \
            ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '--dry-run' || '' }}
