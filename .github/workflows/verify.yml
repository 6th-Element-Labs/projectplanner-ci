# CI-6 — Plane A pull-model verification.
#
# Public hosted runners check out the PRIVATE canonical repo at refs/pull/N/merge
# (will-it-merge-cleanly coverage), run scripts/switchboard_ci.sh, and post a
# required commit status on the PR head SHA.
#
# Triggers:
#   repository_dispatch type verify-pr (primary — Plan VM PR webhook relay, CI-3)
#   workflow_dispatch (manual / acceptance drill)
#   schedule (cron backstop when dispatch is delayed or disabled)
#
# Failure legibility (2026-07-12 lesson): checkout/ref/auth failures post
# "infra: ..."; suite failures post "tests: ...".
#
# Shadow context during soak: projectplanner-ci/full-suite
# CI-6 flips STATUS_CONTEXT to "Switchboard CI / VM gate" (same string as the
# on-box gate) so branch protection is untouched when the required check moves.
#
# Requires secret PRIVATE_READ_TOKEN on this repo (CI-1): read private contents +
# write commit statuses on 6th-Element-Labs/projectplanner.
name: verify

on:
  repository_dispatch:
    types: [verify-pr]
  schedule:
    # Backstop: re-verify the oldest open PR head missing a recent green required check.
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:
    inputs:
      pr:
        description: "Canonical PR number"
        required: true
        type: string
      head_sha:
        description: "PR head commit SHA to stamp"
        required: true
        type: string

permissions: {}

# cancel-in-progress: duplicate dispatches for the same PR supersede in-flight
# runs; the latest dispatch wins and posts the authoritative status.
concurrency:
  group: verify-pr-${{ github.event.client_payload.pr || inputs.pr || 'cron' }}
  cancel-in-progress: true

env:
  CANONICAL_REPO: 6th-Element-Labs/projectplanner
  # CI-6 required context; matches the retired on-box gate so branch protection is unchanged.
  STATUS_CONTEXT: Switchboard CI / VM gate

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Resolve PR + head SHA
        id: coords
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_PR: ${{ github.event.client_payload.pr }}
          DISPATCH_SHA: ${{ github.event.client_payload.head_sha }}
          INPUT_PR: ${{ inputs.pr }}
          INPUT_SHA: ${{ inputs.head_sha }}
          GH_TOKEN: ${{ secrets.PRIVATE_READ_TOKEN }}
        run: |
          set -euo pipefail
          PR=""
          SHA=""
          if [ "$EVENT_NAME" = "repository_dispatch" ]; then
            PR="$DISPATCH_PR"
            SHA="$DISPATCH_SHA"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            PR="$INPUT_PR"
            SHA="$INPUT_SHA"
          elif [ "$EVENT_NAME" = "schedule" ]; then
            # Pick the oldest open PR head missing a green required check.
            mapfile -t rows < <(gh pr list -R "$CANONICAL_REPO" --state open \
              --json number,headRefOid,isDraft \
              --jq '.[] | select(.isDraft | not) | "\(.number) \(.headRefOid)"')
            for row in "${rows[@]}"; do
              pr="${row%% *}"
              sha="${row#* }"
              state=$(gh api "repos/$CANONICAL_REPO/commits/$sha/status" \
                --jq '.statuses[] | select(.context=="'"$STATUS_CONTEXT"'") | .state' \
                | head -1 || true)
              if [ "$state" != "success" ]; then
                PR="$pr"
                SHA="$sha"
                break
              fi
            done
          fi
          if [ -z "$PR" ] || [ -z "$SHA" ]; then
            echo "No PR/SHA to verify for event=$EVENT_NAME — exiting cleanly."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "pr=$PR" >> "$GITHUB_OUTPUT"
          echo "head_sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Verifying PR #$PR at head $SHA"

      - name: Assert PRIVATE_READ_TOKEN is configured
        if: steps.coords.outputs.skip != 'true'
        env:
          TOKEN: ${{ secrets.PRIVATE_READ_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "infra: PRIVATE_READ_TOKEN is not configured on projectplanner-ci (CI-1 operator step)." >&2
            exit 1
          fi

      - name: Post pending required status
        if: steps.coords.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_READ_TOKEN }}
          HEAD_SHA: ${{ steps.coords.outputs.head_sha }}
        run: |
          gh api "repos/$CANONICAL_REPO/statuses/$HEAD_SHA" \
            -f state=pending \
            -f context="$STATUS_CONTEXT" \
            -f description='pull-model verify: running full suite' \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Check out private merge ref
        if: steps.coords.outputs.skip != 'true'
        id: checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CANONICAL_REPO }}
          ref: refs/pull/${{ steps.coords.outputs.pr }}/merge
          token: ${{ secrets.PRIVATE_READ_TOKEN }}
          persist-credentials: false
          path: src
          fetch-depth: 0

      - name: Set up Python
        if: steps.coords.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: src/requirements.txt

      - name: Set up Node
        if: steps.coords.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        if: steps.coords.outputs.skip != 'true'
        working-directory: src
        run: |
          python -m pip install --upgrade pip
          pip install --disable-pip-version-check -r requirements.txt

      - name: Run Switchboard CI suite
        if: steps.coords.outputs.skip != 'true'
        id: suite
        working-directory: src
        env:
          SWITCHBOARD_CI_STRICT: "1"
          SWITCHBOARD_CI_REQUIRE_NODE: "1"
          CONCURRENT_LOAD_REPORT: ".artifacts/concurrent-load-report.json"
        run: |
          unset GITHUB_REPOSITORY
          bash scripts/switchboard_ci.sh

      - name: Upload concurrent-load SLO report
        if: always() && steps.coords.outputs.skip != 'true' && steps.checkout.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: concurrent-load-pr-${{ steps.coords.outputs.pr }}
          path: src/.artifacts/concurrent-load-report.json
          if-no-files-found: warn

      - name: Post required success status
        if: steps.coords.outputs.skip != 'true' && success()
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_READ_TOKEN }}
          HEAD_SHA: ${{ steps.coords.outputs.head_sha }}
          PR: ${{ steps.coords.outputs.pr }}
        run: |
          gh api "repos/$CANONICAL_REPO/statuses/$HEAD_SHA" \
            -f state=success \
            -f context="$STATUS_CONTEXT" \
            -f description="tests: full suite passed (pull-model, PR #$PR)" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Post tests failure status
        if: steps.coords.outputs.skip != 'true' && failure() && steps.checkout.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_READ_TOKEN }}
          HEAD_SHA: ${{ steps.coords.outputs.head_sha }}
        run: |
          gh api "repos/$CANONICAL_REPO/statuses/$HEAD_SHA" \
            -f state=failure \
            -f context="$STATUS_CONTEXT" \
            -f description='tests: switchboard_ci.sh failed — see run log' \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" || true

      - name: Post infra failure status
        if: steps.coords.outputs.skip != 'true' && failure() && steps.checkout.outcome != 'success'
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_READ_TOKEN }}
          HEAD_SHA: ${{ steps.coords.outputs.head_sha }}
          PR: ${{ steps.coords.outputs.pr }}
        run: |
          gh api "repos/$CANONICAL_REPO/statuses/$HEAD_SHA" \
            -f state=failure \
            -f context="$STATUS_CONTEXT" \
            -f description="infra: unable to checkout refs/pull/${PR}/merge — see run log" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" || true
