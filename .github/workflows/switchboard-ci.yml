name: Switchboard CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: switchboard-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-conformance:
    name: Core conformance and smoke tests
    runs-on:
      - self-hosted
      - Linux
      - ARM64
      - switchboard-ci
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt

      - name: Run Switchboard gate
        env:
          PYTHON: python3
          SWITCHBOARD_CI_STRICT: "1"
          SWITCHBOARD_CI_REQUIRE_NODE: "1"
        run: scripts/switchboard_ci.sh
