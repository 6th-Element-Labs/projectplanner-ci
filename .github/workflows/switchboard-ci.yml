name: Switchboard CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: switchboard-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-conformance:
    name: Core conformance and smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Switchboard gate
        env:
          SWITCHBOARD_CI_STRICT: "1"
          SWITCHBOARD_CI_REQUIRE_NODE: "1"
        run: scripts/switchboard_ci.sh
