# Full Switchboard suite. Runs for free on the PUBLIC projectplanner-ci sandbox
# (unlimited GitHub-hosted Actions minutes). On the private canonical repo this
# file is inert because Actions are disabled there; the canonical merge gate is
# the pull-model `verify.yml` workflow on projectplanner-ci, triggered by
# repository_dispatch from the Plan VM webhook. It posts `Switchboard CI / VM gate`
# to the canonical PR head. See docs/CI-STRATEGY.md.
name: backend-tests

on:
  # external_ci_mirror dispatches explicitly; no on:push (it collides with the
  # dispatch run under cancel-in-progress concurrency and cancels a good run).
  workflow_dispatch:
    # external_ci_mirror always passes these as workflow inputs; declare them
    # (optional, traceability only) so `gh workflow run` dispatch is accepted.
    inputs:
      source_sha:
        description: "Canonical source SHA under verification"
        required: false
        type: string
      status_context:
        description: "Required status context reported back to the canonical repo"
        required: false
        type: string

concurrency:
  group: backend-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history: reconcile git-reachability tests need real ancestry

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          # HARDEN-74: cache the pip download/wheel cache keyed on requirements.txt so a
          # green run doesn't reinstall every dependency cold (~30-60s off each run). The
          # mirror dispatches with --ref <ci-branch>, so this runs from the pushed SHA.
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --disable-pip-version-check -r requirements.txt

      - name: Run Switchboard CI suite
        env:
          SWITCHBOARD_CI_STRICT: "1"
          SWITCHBOARD_CI_REQUIRE_NODE: "1"
          CONCURRENT_LOAD_REPORT: ".artifacts/concurrent-load-report.json"
        run: |
          # Strip GitHub's auto-set GITHUB_REPOSITORY: store.py falls back to it for a
          # project's canonical repo, which on this CI repo is the *sandbox* slug and makes
          # reconcile git-reachability tests see a repo mismatch. The VM gate runs with it
          # unset, so match that hermetic environment. (GitHub reserves the GITHUB_ prefix,
          # so `env:` can't blank it — it must be unset in the shell.)
          unset GITHUB_REPOSITORY
          bash scripts/switchboard_ci.sh

      - name: Upload concurrent-load SLO report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: concurrent-load-slo-report
          path: .artifacts/concurrent-load-report.json
          if-no-files-found: warn
