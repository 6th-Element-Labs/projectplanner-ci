<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sign in · Taikun</title>
    <link rel="icon" href="taikun-favicon.png" type="image/png"/>
    <link href="/vendor/tabler/css/tabler.min.css" rel="stylesheet"/>
    <link href="/vendor/tabler/css/tabler-icons.subset.css?v=1" rel="stylesheet"/>
    <link href="taikun-tabler.css?v=23" rel="stylesheet"/>
    <style>
      body{background:#f6f7f9}
      .auth-wrap{min-height:100vh;display:grid;place-items:center;padding:24px}
      .auth-panel{width:100%;max-width:420px}
      .auth-mark{width:42px;height:42px;color:var(--tblr-primary)}
    </style>
</head>
<body>
<main class="auth-wrap">
    <section class="card auth-panel">
        <div class="card-body">
            <div class="d-flex align-items-center gap-2 mb-3">
                <img src="taikun-favicon.png" alt="" class="auth-mark"/>
                <div>
                    <h1 class="h2 mb-0">Taikun</h1>
                    <div class="text-secondary small">Sign in to your account</div>
                </div>
            </div>
            <div id="auth-error" class="alert alert-danger d-none"></div>
            <form id="login-form" class="vstack gap-3">
                <div>
                    <label class="form-label" for="email">Email</label>
                    <input id="email" type="email" class="form-control" autocomplete="username" autofocus required/>
                </div>
                <div>
                    <div class="d-flex justify-content-between align-items-baseline">
                        <label class="form-label mb-0" for="password">Password</label>
                        <a href="/forgot-password" class="small">Forgot password?</a>
                    </div>
                    <input id="password" type="password" class="form-control mt-1" autocomplete="current-password" required/>
                </div>
                <label class="form-check">
                    <input id="remember" type="checkbox" class="form-check-input"/>
                    <span class="form-check-label">Keep me signed in</span>
                </label>
                <button class="btn btn-primary w-100" type="submit">
                    <i class="ti ti-login me-1"></i>Sign in
                </button>
            </form>
            <div class="text-center text-secondary mt-4">
                New here? <a href="/signup">Create an account</a>
            </div>
        </div>
    </section>
</main>
<script>
(function () {
    const params = new URLSearchParams(window.location.search);
    const err = document.getElementById('auth-error');
    function showError(message) {
        err.textContent = message || 'Sign in failed';
        err.classList.remove('d-none');
    }
    document.getElementById('login-form').addEventListener('submit', async function (event) {
        event.preventDefault();
        err.classList.add('d-none');
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                email: document.getElementById('email').value.trim(),
                password: document.getElementById('password').value,
                remember_me: document.getElementById('remember').checked
            })
        });
        if (!res.ok) {
            const data = await res.json().catch(() => ({}));
            showError(data.detail || 'Invalid email or password');
            return;
        }
        window.location.href = params.get('return_to') || '/';
    });
})();
</script>
</body>
</html>
