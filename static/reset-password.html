<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Set a new password · Taikun</title>
    <link rel="icon" href="taikun-favicon.png" type="image/png"/>
    <link href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet"/>
    <link href="taikun-tabler.css?v=23" rel="stylesheet"/>
    <style>
      body{background:#f6f7f9}
      .auth-wrap{min-height:100vh;display:grid;place-items:center;padding:24px}
      .auth-panel{width:100%;max-width:420px}
      .auth-mark{width:42px;height:42px;color:var(--tblr-primary)}
    </style>
</head>
<body>
<main class="auth-wrap">
    <section class="card auth-panel">
        <div class="card-body">
            <div class="d-flex align-items-center gap-2 mb-3">
                <img src="taikun-favicon.png" alt="" class="auth-mark"/>
                <div>
                    <h1 class="h2 mb-0">Set a new password</h1>
                    <div class="text-secondary small">Choose a new password for your account</div>
                </div>
            </div>

            <div id="ok-msg" class="alert alert-success d-none"></div>
            <div id="err-msg" class="alert alert-danger d-none"></div>

            <form id="reset-form" class="vstack gap-3">
                <div>
                    <label class="form-label" for="new_password">New password</label>
                    <input id="new_password" type="password" class="form-control" autocomplete="new-password" minlength="8" required/>
                    <div class="form-hint">At least 8 characters.</div>
                </div>
                <div>
                    <label class="form-label" for="confirm_password">Confirm new password</label>
                    <input id="confirm_password" type="password" class="form-control" autocomplete="new-password" minlength="8" required/>
                </div>
                <button id="reset-submit" class="btn btn-primary w-100" type="submit">
                    <i class="ti ti-key me-1"></i>Set new password
                </button>
            </form>

            <div class="text-center text-secondary mt-4">
                <a href="/login">Back to sign in</a>
            </div>
        </div>
    </section>
</main>
<script>
(function () {
    const ok = document.getElementById('ok-msg');
    const err = document.getElementById('err-msg');
    const form = document.getElementById('reset-form');
    const token = new URLSearchParams(window.location.search).get('token') || '';
    function show(el, msg) { el.textContent = msg; el.classList.remove('d-none'); }
    function hide(el) { el.classList.add('d-none'); }

    if (!token) {
        form.classList.add('d-none');
        show(err, 'This reset link is missing its token. Request a new one from the sign-in page.');
        return;
    }

    form.addEventListener('submit', async function (event) {
        event.preventDefault();
        hide(ok); hide(err);
        const next = document.getElementById('new_password').value;
        const confirm = document.getElementById('confirm_password').value;
        if (next.length < 8) { show(err, 'Password must be at least 8 characters.'); return; }
        if (next !== confirm) { show(err, 'Passwords do not match.'); return; }

        const btn = document.getElementById('reset-submit');
        btn.disabled = true;
        try {
            const res = await fetch('/api/auth/reset-password', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ token: token, new_password: next })
            });
            const data = await res.json().catch(() => ({}));
            if (!res.ok) {
                show(err, data.detail || 'Could not reset your password. The link may have expired.');
                btn.disabled = false;
                return;
            }
            form.classList.add('d-none');
            show(ok, (data.message || 'Your password has been reset.') + ' Redirecting to sign in…');
            setTimeout(function () { window.location.href = '/login'; }, 1800);
        } catch (e) {
            show(err, 'Network error — please try again.');
            btn.disabled = false;
        }
    });
})();
</script>
</body>
</html>
