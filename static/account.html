<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Account · Taikun</title>
    <link rel="icon" href="taikun-favicon.png" type="image/png"/>
    <!--
      UI-20 (6/6): the standalone Account & password page was folded into the unified
      Settings shell (Settings → Profile & security, static/js/settings.js
      `_settingsProfileSection`). This page is now a thin compatibility redirect for old
      bookmarks/links — it still serves HTTP 200, then sends the browser to the canonical
      in-app section. No password form lives here anymore (UI-20 exit criterion 3).
    -->
    <link rel="canonical" href="/#tab-settings/profile"/>
    <meta http-equiv="refresh" content="0; url=/#tab-settings/profile"/>
    <style>body{font-family:system-ui,sans-serif;margin:2rem;color:#556}</style>
</head>
<body>
    <p>Account settings have moved into <a id="acct-link" href="/#tab-settings/profile">Settings → Profile &amp; security</a>. Redirecting…</p>
    <script>
      // Preserve any ?project= context on the way through, then land on the profile section.
      (function () {
          try {
              var u = new URL(window.location.href);
              var target = u.pathname === '/account' ? '/' : '/';
              var dest = target + u.search + '#tab-settings/profile';
              var link = document.getElementById('acct-link');
              if (link) link.setAttribute('href', dest);
              window.location.replace(dest);
          } catch (e) {
              window.location.replace('/#tab-settings/profile');
          }
      })();
    </script>
</body>
</html>
