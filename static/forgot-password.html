<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Reset password · Taikun</title>
    <link rel="icon" href="taikun-favicon.png" type="image/png"/>
    <link href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet"/>
    <link href="taikun-tabler.css?v=23" rel="stylesheet"/>
    <style>
      body{background:#f6f7f9}
      .auth-wrap{min-height:100vh;display:grid;place-items:center;padding:24px}
      .auth-panel{width:100%;max-width:420px}
      .auth-mark{width:42px;height:42px;color:var(--tblr-primary)}
    </style>
</head>
<body>
<main class="auth-wrap">
    <section class="card auth-panel">
        <div class="card-body">
            <div class="d-flex align-items-center gap-2 mb-3">
                <img src="taikun-favicon.png" alt="" class="auth-mark"/>
                <div>
                    <h1 class="h2 mb-0">Reset password</h1>
                    <div class="text-secondary small">We'll email you a link to set a new one</div>
                </div>
            </div>

            <div id="sent-msg" class="alert alert-success d-none"></div>

            <form id="forgot-form" class="vstack gap-3">
                <div>
                    <label class="form-label" for="email">Email</label>
                    <input id="email" type="email" class="form-control" autocomplete="username" autofocus required/>
                </div>
                <button id="forgot-submit" class="btn btn-primary w-100" type="submit">
                    <i class="ti ti-mail me-1"></i>Email me a reset link
                </button>
            </form>

            <div class="text-center text-secondary mt-4">
                <a href="/login"><i class="ti ti-arrow-left me-1"></i>Back to sign in</a>
            </div>
        </div>
    </section>
</main>
<script>
(function () {
    const sent = document.getElementById('sent-msg');
    document.getElementById('forgot-form').addEventListener('submit', async function (event) {
        event.preventDefault();
        const btn = document.getElementById('forgot-submit');
        btn.disabled = true;
        try {
            const res = await fetch('/api/auth/forgot-password', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email: document.getElementById('email').value.trim() })
            });
            const data = await res.json().catch(() => ({}));
            // Always show the same neutral message (no account enumeration).
            sent.textContent = data.message || 'If an account exists for that email, a reset link is on its way.';
            sent.classList.remove('d-none');
            document.getElementById('forgot-form').classList.add('d-none');
        } catch (e) {
            sent.textContent = 'If an account exists for that email, a reset link is on its way.';
            sent.classList.remove('d-none');
        }
    });
})();
</script>
</body>
</html>
