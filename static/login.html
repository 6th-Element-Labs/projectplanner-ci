<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Switchboard Sign In</title>
    <link rel="icon" href="taikun-favicon.png" type="image/png"/>
    <link href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet"/>
    <link href="taikun-tabler.css?v=23" rel="stylesheet"/>
    <style>
      body{background:#f6f7f9}
      .auth-wrap{min-height:100vh;display:grid;place-items:center;padding:24px}
      .auth-panel{width:100%;max-width:420px}
      .auth-mark{width:42px;height:42px;color:var(--tblr-primary)}
    </style>
</head>
<body>
<main class="auth-wrap">
    <section class="card auth-panel">
        <div class="card-body">
            <div class="d-flex align-items-center gap-2 mb-3">
                <img src="taikun-favicon.png" alt="" class="auth-mark"/>
                <div>
                    <h1 class="h2 mb-0">Switchboard</h1>
                    <div class="text-secondary small">Sign in</div>
                </div>
            </div>
            <div id="auth-error" class="alert alert-danger d-none"></div>
            <form id="login-form" class="vstack gap-3">
                <div>
                    <label class="form-label" for="project">Project</label>
                    <input id="project" class="form-control" autocomplete="organization" value="switchboard"/>
                </div>
                <div>
                    <label class="form-label" for="login">Login</label>
                    <input id="login" class="form-control" autocomplete="username" autofocus/>
                </div>
                <div>
                    <label class="form-label" for="password">Password</label>
                    <input id="password" class="form-control" type="password" autocomplete="current-password"/>
                </div>
                <button class="btn btn-primary w-100" type="submit">
                    <i class="ti ti-login me-1"></i>Sign in
                </button>
            </form>
            <details class="mt-4">
                <summary class="text-secondary small">First admin</summary>
                <form id="bootstrap-form" class="vstack gap-2 mt-3">
                    <input id="bootstrap-login" class="form-control form-control-sm" placeholder="admin login" autocomplete="off"/>
                    <input id="bootstrap-password" class="form-control form-control-sm" type="password" placeholder="admin password" autocomplete="new-password"/>
                    <input id="bootstrap-token" class="form-control form-control-sm" type="password" placeholder="bootstrap token"/>
                    <button class="btn btn-outline-primary btn-sm" type="submit">Create admin</button>
                </form>
            </details>
        </div>
    </section>
</main>
<script>
(function () {
    const params = new URLSearchParams(window.location.search);
    const storedProject = localStorage.getItem('pm_project') || '';
    const projectInput = document.getElementById('project');
    projectInput.value = params.get('project') || storedProject || 'switchboard';
    const err = document.getElementById('auth-error');
    function showError(message) {
        err.textContent = message || 'Sign in failed';
        err.classList.remove('d-none');
    }
    function target(project) {
        localStorage.setItem('pm_project', project);
        return params.get('return_to') || ('/?project=' + encodeURIComponent(project));
    }
    document.getElementById('login-form').addEventListener('submit', async function (event) {
        event.preventDefault();
        err.classList.add('d-none');
        const project = projectInput.value.trim() || 'switchboard';
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                project,
                login: document.getElementById('login').value.trim(),
                password: document.getElementById('password').value
            })
        });
        if (!res.ok) {
            const data = await res.json().catch(() => ({}));
            showError(data.detail || 'Invalid login or password');
            return;
        }
        window.location.href = target(project);
    });
    document.getElementById('bootstrap-form').addEventListener('submit', async function (event) {
        event.preventDefault();
        err.classList.add('d-none');
        const project = projectInput.value.trim() || 'switchboard';
        const res = await fetch('/api/auth/bootstrap', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-Switchboard-Bootstrap-Token': document.getElementById('bootstrap-token').value
            },
            body: JSON.stringify({
                project,
                login: document.getElementById('bootstrap-login').value.trim() || 'admin',
                password: document.getElementById('bootstrap-password').value
            })
        });
        if (!res.ok) {
            const data = await res.json().catch(() => ({}));
            showError(data.detail || 'Admin bootstrap failed');
            return;
        }
        window.location.href = target(project);
    });
})();
</script>
</body>
</html>
