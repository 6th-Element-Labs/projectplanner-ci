# Minimal LiteLLM gateway for ProjectPlanner (same shape as the ActionEngine
# gateway, without the platform's audit callback). The app connects through this
# using the logical model names taikun-chat / taikun-embed, so it never holds the
# OpenAI key directly and models can be swapped here without touching the app.
model_list:
  - model_name: taikun-chat
    litellm_params:
      model: openai/gpt-5.5              # adjust if OpenAI's exact model id is dated/suffixed
      api_key: os.environ/OPENAI_API_KEY
  - model_name: taikun-embed
    litellm_params:
      model: openai/text-embedding-3-small
      api_key: os.environ/OPENAI_API_KEY
  - model_name: taikun-transcribe
    litellm_params:
      model: openai/whisper-1            # OpenAI speech-to-text; reachable at /v1/audio/transcriptions
      api_key: os.environ/OPENAI_API_KEY
  - model_name: taikun-ocr
    litellm_params:
      model: openai/gpt-4o               # vision model for PDF OCR (ocr.py); swap freely
      api_key: os.environ/OPENAI_API_KEY
  - model_name: taikun-summarize
    litellm_params:
      model: openai/gpt-4o-mini          # cheap NON-reasoning summarizer (summarize.py); respects
      api_key: os.environ/OPENAI_API_KEY  # the 120-tok output cap. ~50-100x cheaper than taikun-chat.
                                          # Cheaper still: gpt-4.1-nano. Default via PM_SUMMARIZE_MODEL.
  - model_name: taikun-haiku
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001  # alt summarizer; needs ANTHROPIC_API_KEY in .env.
      api_key: os.environ/ANTHROPIC_API_KEY        # gpt-4o-mini (taikun-summarize) is the default.

litellm_settings:
  drop_params: true

general_settings:
  master_key: os.environ/LLM_GATEWAY_MASTER_KEY
